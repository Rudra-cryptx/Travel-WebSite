<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JourneyEase | Agent Login</title>
    <!-- Modern Google Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for elegant icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
    <meta name="description" content="Login portal for JourneyEase Travel Agency partners and agents.">
</head>

<body>
    <!-- Abstract blurred shapes for background depth -->
    <div class="bg-shape circle-1"></div>
    <div class="bg-shape circle-2"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Your next grand adventure awaits.</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class='bx bx-envelope icon'></i>
                    <input type="email" id="email" placeholder=" " autocomplete="off" required>
                    <label for="email">Email Address</label>
                </div>

                <div class="input-group">
                    <i class='bx bx-lock-alt icon'></i>
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                    <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">
                    <span>Sign In</span>
                    <i class='bx bx-right-arrow-alt'></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Don't have an agency account? <a href="#">Apply now</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
